<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Trabajo practico numero 5 (practica con DOM) "
    />
    <meta name="author" content="Luis Altamiranda" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Ejercicio 2</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid text-center">
          <a class="navbar-brand" href="../index.html">Trabajo Practico N°5</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="../index.html"
                  >Inicio</a
                >
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>
    <main class="container">
      <section>
        <form id="formAlta">
          <div class="mb-3">
            <label for="nombre" class="form-label"
              >Nombre</label
            >
            <input
              id="nombrePersona"
              type="text"
              class="form-control"
              id="texto"
              placeholder="Ingrese el nombre"
              minlength="5"
              maxlength="50"
           
            />
           
          </div>
          <div class="mb-3">
            <label for="apellido" class="form-label"
              >Apellido</label
            >
            <input
              id="apellidoPersona"
              type="text"
              class="form-control"
              id="texto"
              placeholder="Ingrese el apellido"
              minlength="5"
              maxlength="50"
           
            />
           
          </div>
          <div class="mb-3">
            <label for="añoNacimiento" class="form-label"
              >Año de Nacimiento</label
            >
            <input
              id="anioNac"
              type="number"
              class="form-control"
              id="texto"
              placeholder="Ingrese año de nacimiento"
              minlength="4"
              maxlength="4"
           
            />
           
          </div>
          <div class="mb-3">
            <label for="dni" class="form-label"
              >DNI</label
            >
            <input
              id="dniPersona"
              type="number"
              class="form-control"
              id="number"
              placeholder="Ingrese el DNI sin puntos ej: 39356021"
              minlength="5"
              maxlength="10"
           
            />
           
          </div>
          
          <button id="btnFormulario" type="submit" class="btn btn-success">Enviar</button>
        </form>
        <div class="mt-3">
             <button id="btnMostrarGeneracion" class="btn btn-primary">Mostrar Generacion</button>
        <button id="btmMostrarEdad" class="btn btn-danger">Mostrar si es mayor de edad</button>
        </div>
       
      </section>
      <div id="pantalla"></div>
    </main>

    <footer class="bg-danger">
      <div class="container">
        <div class="row">
          <article class="col-12 col-md-3 col-lg-4 text-center">
            <h4>Objetivo</h4>
            <p class="">Ejercicios Practicos del DOM</p>
          </article>
          <article class="col-12 col-md-3 col-lg-4 text-center">
            <h4>Herramientas utilizadas</h4>
            <ul>
              <li>HTML 5</li>
              <li>CSS</li>
              <li>Bootstrap</li>
              <li>JavaScript</li>
            </ul>
          </article>
          <article class="col-12 col-md-3 col-lg-4 text-center">
            <h4>Contacto</h4>
            <div class="d-flex justify-content-center">
              <a href="" class="iconos-footer nav-link"
                ><i class="bi bi-linkedin"></i
              ></a>
              <a href="" class="iconos-footer nav-link"
                ><i class="bi bi-github"></i
              ></a>
            </div>
          </article>
        </div>
        <p class="text-center">&copy;Todos los derechos son reservados</p>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../js/ejercicio2.js"></script>
  </body>
</html>
